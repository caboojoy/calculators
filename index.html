<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기 모음</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #f8f9fb;
            --text-primary: #1a1d23;
            --text-secondary: #5a6070;
            --text-muted: #9aa0ae;
            --border: #e4e7ed;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
            --radius: 14px;
            --radius-sm: 8px;
            --cat-basic: #2563eb;
            --cat-basic-bg: #eff6ff;
            --cat-advanced: #7c3aed;
            --cat-advanced-bg: #f5f3ff;
            --cat-salary: #059669;
            --cat-salary-bg: #ecfdf5;
            --cat-health: #dc2626;
            --cat-health-bg: #fff1f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .logo { font-size: 1.15rem; font-weight: 900; color: var(--text-primary); letter-spacing: -.02em; white-space: nowrap; }
        .logo span { color: var(--accent); }

        .search-wrap { flex: 1; max-width: 420px; position: relative; }
        .search-wrap svg {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); width: 16px; height: 16px; pointer-events: none;
        }
        .search-wrap input {
            width: 100%; padding: 9px 16px 9px 40px;
            border: 1.5px solid var(--border); border-radius: 50px;
            font-size: 14px; font-family: inherit;
            background: var(--surface2); color: var(--text-primary);
            outline: none; transition: border-color .2s, box-shadow .2s;
        }
        .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); background: var(--surface); }
        .search-wrap input::placeholder { color: var(--text-muted); }

        /* ── HERO ── */
        .hero { max-width: 1200px; margin: 0 auto; padding: 48px 24px 32px; }
        .hero h1 { font-size: 2rem; font-weight: 900; letter-spacing: -.04em; color: var(--text-primary); margin-bottom: 6px; }
        .hero p { font-size: .95rem; color: var(--text-secondary); }

        /* ── TOP PANELS ── */
        .top-panels { max-width: 1200px; margin: 0 auto; padding: 0 24px 16px; display: grid; gap: 12px; }
        .panel { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .panel-body { padding: 16px 16px 14px; }
        .panel-kicker {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 9px; border-radius: 999px;
            font-size: 11px; font-weight: 700;
            color: var(--accent); background: var(--accent-light); margin-bottom: 10px;
        }
        .panel-title { font-size: 1.02rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 6px; }
        .panel-desc { color: var(--text-secondary); font-size: .82rem; line-height: 1.55; margin-bottom: 12px; }

        /* ── STORE ── */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .store-link {
            display: block; text-decoration: none; color: inherit;
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
            border: 1.5px solid var(--border); border-radius: 12px; padding: 12px;
            transition: transform .18s, box-shadow .18s, border-color .18s;
        }
        .store-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: rgba(37,99,235,.25); }
        .store-link.disabled { cursor: default; opacity: .78; }
        .store-label { display: inline-block; font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 999px; background: var(--accent-light); color: var(--accent); margin-bottom: 8px; }
        .store-name { font-size: .9rem; font-weight: 800; }

        #store-promo-panel .panel-body { padding: 12px 12px 11px; }
        #store-promo-panel .panel-kicker { margin-bottom: 8px; }
        #store-promo-panel .store-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; }
        #store-promo-panel .store-link { border-radius: 10px; padding: 9px 10px; }
        #store-promo-panel .store-label { margin-bottom: 6px; }
        #store-promo-panel .store-name { font-size: .84rem; line-height: 1.35; }

        /* ── SUPPORT ── */
        .support-section { max-width: 1200px; margin: 0 auto; padding: 0 24px 24px; }
        .support-note { font-size: .74rem; color: var(--text-muted); line-height: 1.5; margin-top: 10px; }

        /* ── FILTER TABS ── */
        .filter-bar { max-width: 1200px; margin: 0 auto; padding: 0 24px 28px; display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn {
            display: flex; align-items: center; gap: 6px; padding: 7px 16px;
            border-radius: 50px; border: 1.5px solid var(--border); background: var(--surface);
            font-size: 13px; font-weight: 500; font-family: inherit; color: var(--text-secondary);
            cursor: pointer; transition: all .18s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .filter-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .6; }
        .filter-btn[data-category="basic"]    .filter-dot { background: var(--cat-basic); }
        .filter-btn[data-category="advanced"] .filter-dot { background: var(--cat-advanced); }
        .filter-btn[data-category="salary"]   .filter-dot { background: var(--cat-salary); }
        .filter-btn[data-category="health"]   .filter-dot { background: var(--cat-health); }
        .filter-btn.active .filter-dot { background: rgba(255,255,255,.7); }

        /* ── MAIN ── */
        .main { max-width: 1200px; margin: 0 auto; padding: 0 24px 80px; }
        .category-section { margin-bottom: 48px; }
        .category-section:last-child { margin-bottom: 0; }

        .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .section-color-bar { width: 4px; height: 22px; border-radius: 2px; }
        .basic-section    .section-color-bar { background: var(--cat-basic); }
        .advanced-section .section-color-bar { background: var(--cat-advanced); }
        .salary-section   .section-color-bar { background: var(--cat-salary); }
        .health-section   .section-color-bar { background: var(--cat-health); }
        .section-head h2 { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .section-count { margin-left: auto; font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }

        /* ── CARD ── */
        .card {
            background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border);
            overflow: hidden; cursor: pointer;
            transition: transform .22s ease, box-shadow .22s ease, border-color .22s;
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: transparent; }

        .card-thumb {
            height: 130px; display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; position: relative; overflow: hidden;
        }
        .basic-section    .card-thumb { background: var(--cat-basic-bg); }
        .advanced-section .card-thumb { background: var(--cat-advanced-bg); }
        .salary-section   .card-thumb { background: var(--cat-salary-bg); }
        .health-section   .card-thumb { background: var(--cat-health-bg); }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .status-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; letter-spacing: .03em; }
        .badge-ready { background: #dcfce7; color: #15803d; }
        .badge-soon  { background: rgba(255,255,255,.85); color: var(--text-muted); }

        .card-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: .95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -.02em; }
        .card-desc  { font-size: .8rem; color: var(--text-secondary); line-height: 1.55; flex: 1; }
        .card-footer { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }

        .card-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
        .basic-section    .card-tag { background: var(--cat-basic-bg);    color: var(--cat-basic); }
        .advanced-section .card-tag { background: var(--cat-advanced-bg); color: var(--cat-advanced); }
        .salary-section   .card-tag { background: var(--cat-salary-bg);   color: var(--cat-salary); }
        .health-section   .card-tag { background: var(--cat-health-bg);   color: var(--cat-health); }

        .card-arrow {
            width: 26px; height: 26px; border-radius: 50%;
            border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); transition: all .18s;
        }
        .card:hover .card-arrow { background: var(--accent); border-color: var(--accent); color: #fff; }
        .card.soon .card-arrow { opacity: 0; }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state p { font-size: .95rem; }

        /* ── MODAL ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(10,14,26,.5); z-index: 500;
            backdrop-filter: blur(4px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border-radius: 20px; width: 100%; max-width: 520px;
            box-shadow: var(--shadow-lg); overflow: hidden;
            animation: modalIn .22s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(.93) translateY(8px); }
            to   { opacity: 1; transform: scale(1)  translateY(0); }
        }
        .modal-thumb { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .modal-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .modal-body { padding: 24px 28px 28px; }
        .modal-cat   { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 6px; }
        .modal-title { font-size: 1.4rem; font-weight: 900; letter-spacing: -.03em; margin-bottom: 12px; }
        .modal-desc  { font-size: .875rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px; }
        .modal-actions { display: flex; gap: 10px; }

        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 11px 20px;
            border-radius: 50px; font-size: 14px; font-weight: 600; font-family: inherit;
            cursor: pointer; border: none; transition: all .18s;
        }
        .btn-primary { background: var(--accent); color: #fff; flex: 1; justify-content: center; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
        .btn-ghost { background: var(--surface2); color: var(--text-secondary); border: 1.5px solid var(--border); }
        .btn-ghost:hover { border-color: var(--text-secondary); color: var(--text-primary); }

        /* ── FOOTER ── */
        footer { text-align: center; padding: 24px; color: var(--text-muted); font-size: .8rem; border-top: 1px solid var(--border); background: var(--surface); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .header-inner { gap: 12px; }
            .hero { padding: 32px 16px 24px; }
            .hero h1 { font-size: 1.5rem; }
            .top-panels, .filter-bar, .main, .support-section { padding-left: 16px; padding-right: 16px; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <div class="logo">계산기<span>모음</span></div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" placeholder="계산기 검색...">
        </div>
    </div>
</header>

<!-- HERO -->

</div>

<!-- TOP PANELS -->
<section class="top-panels">
    <div class="panel" id="store-promo-panel"></div>
</section>

<!-- FILTER -->
<div class="filter-bar">
    <button class="filter-btn active" data-category="all"><span>전체</span></button>

    <button class="filter-btn" data-category="advanced"><span class="filter-dot"></span>고급 계산기</button>
    <button class="filter-btn" data-category="salary"><span class="filter-dot"></span>급여 계산기</button>
    <button class="filter-btn" data-category="health"><span class="filter-dot"></span>건강 계산기</button>
</div>

<!-- MAIN -->
<main class="main" id="main-container"></main>

<!-- SUPPORT -->
<section class="support-section">
    <div class="panel" id="support-panel"></div>
</section>

<!-- FOOTER -->
<footer>© 2025 계산기 모음 | 모든 계산은 참고용이며 공식 확인을 권장합니다</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
        <div class="modal-thumb" id="modal-thumb"></div>
        <div class="modal-body">
            <div class="modal-cat" id="modal-cat"></div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-desc" id="modal-desc"></div>
            <div class="modal-actions">
                <button class="btn btn-ghost" id="modal-close-btn">닫기</button>
                <button class="btn btn-primary" id="modal-open-btn">계산기 열기</button>
            </div>
        </div>
    </div>
</div>

// ── 렌더링 ──────────────────────────────────────────────
function getCatMeta(catId) {
    return categories.find(c => c.id === catId);
}

function renderTopPanels() {
    const storePanel   = document.getElementById('store-promo-panel');
    const supportPanel = document.getElementById('support-panel');

    // 스토어 패널
    storePanel.innerHTML = `
        <div class="panel-body">
            <div class="panel-kicker">스토어 홍보</div>
            <div class="store-grid">
                ${smartStores.map(store => store.url
                    ? `<a class="store-link" href="${store.url}" target="_blank" rel="noopener noreferrer">
                           <div class="store-label">${store.label}</div>
                           <div class="store-name">${store.name}</div>
                       </a>`
                    : `<div class="store-link disabled">
                           <div class="store-label">${store.label}</div>
                           <div class="store-name">${store.name}</div>
                       </div>`
                ).join('')}
            </div>
        </div>`;

    // 문의 패널
    supportPanel.innerHTML = `
        <div class="panel-body">
            <div class="panel-kicker">문의 접수</div>
            <div class="panel-title">불편한 점이나 개선 아이디어를 알려주세요</div>
            <div class="panel-desc">버그 신고, 기능 제안, 사용 문의 등 소중한 의견을 남겨 주시면 더 나은 계산기를 만드는 데 반영하겠습니다.</div>
            <button class="btn btn-primary" id="open-form-btn" style="width:100%; justify-content:center;">
                문의하기 →
            </button>
            <p class="support-note">버튼을 누르면 구글폼이 새 탭에서 열립니다.</p>
        </div>`;

    document.getElementById('open-form-btn').addEventListener('click', () => {
        const { googleFormUrl } = supportConfig;
        if (!googleFormUrl) {
            alert('구글폼 URL이 설정되지 않았습니다.');
            return;
        }
        window.open(googleFormUrl, '_blank', 'noopener,noreferrer');
    });
}

function renderCard(calc) {
    const thumb = calc.image
        ? `<img src="${calc.image}" alt="${calc.title}" onerror="this.parentElement.innerHTML='${calc.icon}'">`
        : calc.icon;
    const badge = calc.ready
        ? `<span class="status-badge badge-ready">사용 가능</span>`
        : `<span class="status-badge badge-soon">준비 중</span>`;

    return `
        <div class="card ${calc.ready ? 'ready' : 'soon'}" data-id="${calc.id}" role="button" tabindex="0">
            <div class="card-thumb">${thumb}${badge}</div>
            <div class="card-body">
                <div class="card-title">${calc.title}</div>
                <div class="card-desc">${calc.desc}</div>
                <div class="card-footer">
                    <span class="card-tag">${getCatMeta(calc.category).name}</span>
                    <span class="card-arrow">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </span>
                </div>
            </div>
        </div>`;
}

function renderAll(list, activeCategory) {
    const container = document.getElementById('main-container');
    if (!list.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다</p></div>`;
        return;
    }
    const filtered = activeCategory === 'all' ? categories : categories.filter(c => c.id === activeCategory);
    let html = '';
    filtered.forEach(cat => {
        const items = list.filter(c => c.category === cat.id);
        if (!items.length) return;
        html += `
            <section class="category-section ${cat.id}-section" data-category="${cat.id}">
                <div class="section-head">
                    <div class="section-color-bar"></div>
                    <h2>${cat.name}</h2>
                    <span class="section-count">${items.filter(c=>c.ready).length}/${items.length} 사용 가능</span>
                </div>
                <div class="card-grid">
                    ${items.map(c => renderCard(c)).join('')}
                </div>
            </section>`;
    });
    container.innerHTML = html;
}

// ── 필터·검색 ──────────────────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function getFiltered() {
    return calculators.filter(c => {
        const matchCat    = currentFilter === 'all' || c.category === currentFilter;
        const matchSearch = !currentSearch || c.title.includes(currentSearch) || c.desc.includes(currentSearch);
        return matchCat && matchSearch;
    });
}

renderTopPanels();
function refresh() { renderAll(getFiltered(), currentFilter); }
refresh();

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.category;
        refresh();
    });
});

document.getElementById('search-input').addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    refresh();
});

// ── 모달 ──────────────────────────────────────────────
const overlay    = document.getElementById('modal-overlay');
const modalThumb = document.getElementById('modal-thumb');
const modalCat   = document.getElementById('modal-cat');
const modalTitle = document.getElementById('modal-title');
const modalDesc  = document.getElementById('modal-desc');
const openBtn    = document.getElementById('modal-open-btn');
const closeBtn2  = document.getElementById('modal-close-btn');

function openModal(calc) {
    const cat = getCatMeta(calc.category);
    modalThumb.innerHTML = calc.image
        ? `<img src="${calc.image}" alt="${calc.title}" onerror="this.parentElement.innerHTML='${calc.icon}'">`
        : calc.icon;
    modalThumb.style.background = `var(--cat-${calc.category}-bg)`;
    modalCat.style.color   = cat.color;
    modalCat.textContent   = cat.name;
    modalTitle.textContent = calc.title;
    modalDesc.textContent  = calc.detail || calc.desc;
    openBtn.disabled    = !calc.ready;
    openBtn.textContent = calc.ready ? '계산기 열기' : '준비 중입니다';
    openBtn.onclick     = calc.ready ? () => { window.location.href = calc.url; } : null;
    overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }

closeBtn2.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

document.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const id   = parseInt(card.dataset.id);
    const calc = calculators.find(c => c.id === id);
    if (calc) openModal(calc);
});
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const card = document.activeElement.closest('.card');
        if (card) card.click();
    }
});
</script>
